<app-hero-section 
  [title]="'HEADER.NAV_APPOINTMENT'"
  [breadcrumbs]="breadcrumbs">
</app-hero-section>

<main class="appointment-page">
  <section class="appointment-empty-state" aria-labelledby="appointment-coming-soon-title">
    <div class="appointment-empty-state__inner">
      <h2 id="appointment-coming-soon-title" class="appointment-empty-state__title">{{ 'COMMON.COMING_SOON' | translate }}</h2>
      <p class="appointment-empty-state__description">
        {{ 'APPOINTMENT.SUBTITLE' | translate }}
      </p>
      <div class="appointment-empty-state__notice" role="status" aria-live="polite">
        <p class="appointment-empty-state__notice-text">
          {{ 'FAVORITES.APPOINTMENT.EMERGENCY_NOTE' | translate }}
        </p>
      </div>
    </div>
  </section>
</main>
