<section class="hero-section" [attr.data-theme]="colorTheme">
  <div class="hero-section__ambient" aria-hidden="true"></div>
  <div class="hero-section__blobs" aria-hidden="true">
    <div class="hero-section__blob hero-section__blob--1"></div>
    <div class="hero-section__blob hero-section__blob--2"></div>
  </div>
  <div class="hero-section__noise" aria-hidden="true"></div>

  <div class="hero-section__content">
    <nav class="hero-section__breadcrumb"
         *ngIf="breadcrumbs && breadcrumbs.length > 0"
         [attr.aria-label]="'COMMON.BREADCRUMB_NAV' | translate">
      <ol>
        <li *ngFor="let crumb of breadcrumbs; let last = last">
          <ng-container *ngIf="crumb.link && !last; else currentCrumb">
            <a [routerLink]="crumb.link" class="hero-section__crumb-link">
              {{ crumb.label | translate }}
            </a>
            <span class="hero-section__crumb-sep material-icons-rounded" aria-hidden="true">chevron_right</span>
          </ng-container>
          <ng-template #currentCrumb>
            <span class="hero-section__crumb-current" [attr.aria-current]="last ? 'page' : null">
              {{ crumb.label | translate }}
            </span>
          </ng-template>
        </li>
      </ol>
    </nav>

    <h1 class="hero-section__title">{{ title | translate }}</h1>
    <p class="hero-section__subtitle" *ngIf="subtitle">{{ subtitle | translate }}</p>
  </div>
</section>
