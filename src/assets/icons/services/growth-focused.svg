<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- Ground/soil line -->
  <path d="M8 38 C12 37, 20 36.5, 24 37 C28 37.5, 36 37, 40 38" />
  <!-- Seedling stem - organic, slightly curved -->
  <path d="M24 37 C24 34, 23.5 30, 24 26" />
  <!-- Left leaf -->
  <path d="M24 30 C20 28, 16 30, 16 32 C16 34, 20 34, 24 32" />
  <!-- Right leaf -->
  <path d="M24 26 C28 24, 32 26, 32 28 C32 30, 28 30, 24 28" />
  <!-- Small unfurling leaf at top -->
  <path d="M24 26 C23 24, 22 22, 23 20 C24 18, 26 19, 26 21 C26 23, 25 25, 24 26" />
  <!-- Leaf veins (subtle) -->
  <line x1="24" y1="31" x2="19" y2="31.5" stroke-width="1" opacity="0.3" />
  <line x1="24" y1="27" x2="29" y2="27.5" stroke-width="1" opacity="0.3" />
  <!-- Sun above -->
  <circle cx="36" cy="10" r="4" />
  <!-- Sun rays - warm, organic -->
  <line x1="36" y1="4" x2="36" y2="2" stroke-width="1.5" />
  <line x1="40.5" y1="5.5" x2="42" y2="4" stroke-width="1.5" />
  <line x1="42" y1="10" x2="44" y2="10" stroke-width="1.5" />
  <line x1="40.5" y1="14.5" x2="42" y2="16" stroke-width="1.5" />
  <line x1="36" y1="16" x2="36" y2="18" stroke-width="1.5" />
  <line x1="31.5" y1="14.5" x2="30" y2="16" stroke-width="1.5" />
  <line x1="30" y1="10" x2="28" y2="10" stroke-width="1.5" />
  <line x1="31.5" y1="5.5" x2="30" y2="4" stroke-width="1.5" />
  <!-- Accent: sun rays glow -->
  <circle class="accent" cx="36" cy="10" r="7"
          fill="currentColor" stroke="none" opacity="0.15" />
  <!-- Small soil dots -->
  <circle cx="18" cy="39" r="1" fill="currentColor" stroke="none" opacity="0.2" />
  <circle cx="24" cy="39.5" r="1.2" fill="currentColor" stroke="none" opacity="0.15" />
  <circle cx="30" cy="39" r="0.8" fill="currentColor" stroke="none" opacity="0.2" />
</svg>
